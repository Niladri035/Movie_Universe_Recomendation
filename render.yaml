services:
  # Backend Web Service
  - type: web
    name: movie-universe-api
    runtime: node
    plan: free
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PORT
        value: 5000
      - key: NODE_VERSION
        value: 18.0.0
      - key: CLIENT_URL
        value: https://movie-universe-recomendation-2cit.vercel.app
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: TMDB_API_KEY
        sync: false
      - key: TMDB_API_READ_ACCESS_TOKEN
        sync: false
      - key: TMDB_BASE_URL
        value: https://api.tmdb.org/3

  # Frontend Static Site
  - type: static
    name: movie-universe-client
    runtime: static
    plan: free
    rootDir: client
    buildCommand: npm install && npm run build
    publishDir: dist
    envVars:
      - key: VITE_API_URL
        value: https://movie-universe-recomendation.onrender.com/api # Updated backend URL
      - key: VITE_TMDB_IMAGE_BASE
        value: https://image.tmdb.org/t/p
